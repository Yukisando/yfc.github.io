<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yukisan Fan Club</title>

    <!-- Resource hints for performance -->
    <link rel="preconnect" href="https://github.com" />
    <link rel="dns-prefetch" href="https://github.com" />
    <link rel="preconnect" href="https://user-attachments.githubusercontent.com" />
    <link rel="dns-prefetch" href="https://user-attachments.githubusercontent.com" />

    <link rel="stylesheet" href="styles.css" />
    <link rel="shortcut icon" type="image/png" href="assets/yuki.png" />
  </head>
  <body>
    <!-- Navbar yuki -->
    <div class="nav-bar">
      <button
        type="button"
        class="button-link yuki-emote-btn"
        onclick="playRandomEmote()"
        aria-label="Play a random Yükisan emote"
        title="Play a random emote"
      >
        <img src="assets/yuki_bg.png" alt="Yükisan" width="60" />
      </button>

      <!-- Navbar title (click to go home) -->
      <h1 id="title">
        <a href="#/" class="title-link">
          <span class="title-full">Yükisan Fan Club</span>
          <span class="title-short">YFC</span>
        </a>
      </h1>

      <!-- Playlist controls -->
      <div class="playlist-controls" id="playlistControls">
        <button
          class="playlist-button"
          id="playlistPlayPause"
          title="Play playlist"
          aria-label="Play playlist"
          onclick="togglePlaylist()"
        >
          <svg class="icon icon-play" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
          <svg class="icon icon-pause" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        </button>
        <button
          class="playlist-button"
          id="playlistNext"
          title="Next track"
          aria-label="Next track"
          onclick="nextTrack()"
        >
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l8.5 6L6 18V6zm10 0h2v12h-2z"/></svg>
        </button>
      </div>
    </div>

    <!-- Now-playing toast -->
    <div id="trackToast" class="track-toast" aria-live="polite"></div>

    <!-- Floating New Post button - Opens modal form -->
    <button
      type="button"
      class="new-post-button"
      title="Create New Post"
      aria-label="Create New Post"
      onclick="openNewPostModal()"
    >
      +
    </button>
    <!-- New Post Modal (public form) -->
    <div id="newPostModal" class="modal" style="display:none;">
      <div class="modal-content">
        <span class="modal-close" onclick="closeNewPostModal()">&times;</span>
        <h2>Add a New Post</h2>
        <form id="newPostForm" autocomplete="off">
          <label>Date<br>
            <input type="text" name="date" id="newPostDate" pattern="\\d{2}-\\d{2}-\\d{4}" required readonly style="cursor:pointer;" onclick="showDatePicker(this, event)">
          </label><br>
          <label>Caption<br><textarea name="content" maxlength="200" required></textarea></label><br>
          <label>Images<br>
            <input type="file" name="images" id="newPostImages" accept="image/*" multiple required style="display:none;">
            <button type="button" id="uploadBtn" class="upload-icon-btn" onclick="document.getElementById('newPostImages').click(); return false;" aria-label="Upload images">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fac800" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </button>
            <span id="fileCount" style="margin-left:8px;font-size:0.95em;"></span>
          </label><br>
          <label>Password<br><input type="password" name="password" required></label><br>
          <button type="submit">Submit</button>
          <div id="newPostStatus" style="margin-top:8px;"></div>
        </form>
      </div>
    </div>

    <!-- Floating scroll button (toggles top/bottom) -->
    <button
      class="scroll-button"
      id="scrollButton"
      onclick="scrollToPosition()"
      aria-label="Scroll"
    >
      <svg class="icon icon-down" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 16.5l-7-7 1.4-1.4L12 13.7l5.6-5.6L19 9.5z"/></svg>
      <svg class="icon icon-up" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 7.5l7 7-1.4 1.4L12 10.3l-5.6 5.6L5 14.5z"/></svg>
    </button>

    <!-- Bento Dashboard (home view) -->
    <main id="dashboard" class="dashboard">
      <div class="bento-grid">
        <a class="bento-tile bento-gallery" id="screenshotOfTheDay" href="#/gallery" aria-label="Browse all posts">
          <div class="sotd-bg">
            <div class="image-placeholder"></div>
            <img id="sotdImage" alt="" class="post-image lazy-load" />
          </div>
          <div class="bento-tile-inner">
            <span class="bento-eyebrow">Gallery</span>
            <h2>Browse all posts</h2>
            <div class="bento-stat"><span id="postCount">—</span><small>posts</small></div>
            <span class="bento-cta">Open gallery →</span>
          </div>
        </a>

        <a class="bento-tile bento-armory"
           href="https://worldofwarcraft.blizzard.com/en-gb/character/eu/dalaran/y%C3%BCkisan"
           target="_blank" rel="noopener">
          <span class="bento-eyebrow">Armory</span>
          <h2>Yükisan</h2>
          <p class="bento-sub">Dalaran · EU</p>
          <span class="bento-cta">Open Blizzard Armory →</span>
        </a>

        <div class="bento-tile bento-stats" id="charStats">
          <span class="bento-eyebrow">Character</span>
          <h2 id="charStatsTitle">Yükisan</h2>
          <p class="bento-sub" id="charStatsSub">Loading the rap sheet…</p>

          <div class="death-hero" id="deathHero" hidden>
            <div class="death-hero-number" id="deathHeroNumber">—</div>
            <div class="death-hero-label">Total Deaths</div>
            <ul class="death-breakdown" id="deathBreakdown"></ul>
          </div>

          <ul id="charStatsList" class="stats-list">
            <li class="stats-loading">Loading…</li>
          </ul>
          <span class="bento-source" id="statsSource"></span>
        </div>
      </div>
    </main>

    <!-- Gallery wrapper: timeline slider + posts grid -->
    <div id="galleryWrap">
      <div id="expansionSlider" class="expansion-slider" aria-label="World of Warcraft expansion timeline"></div>
      <div id="posts-container" class="grid-container"></div>
    </div>

    <!-- Post Modal for expanded view -->
    <div id="postModal" class="post-modal">
      <div class="post-modal-content">
        <span class="post-modal-close" onclick="closePostModal()">&times;</span>
        <div id="modalPostContent"></div>
      </div>
    </div>
  </body>
  <script src="scripts.js" defer></script>
  <script src="new-post.js" defer></script>
</html>
