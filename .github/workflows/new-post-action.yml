name: "Add New Post via Form"
on:
  repository_dispatch:
    types: [add-new-post]
  workflow_dispatch:
    inputs:
      post_data:
        description: 'JSON string: {"date":"DD-MM-YYYY","content":"...","images":["post-assets/..."]}'
        required: true
        type: string
jobs:
  add-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Pull latest (image commits land before dispatch)
        run: git pull --rebase
      - name: Add new post to posts.json
        env:
          POST_DATA: ${{ github.event.client_payload.post_data || github.event.inputs.post_data }}
        run: |
          node -e "
          const fs = require('fs');
          const post = JSON.parse(process.env.POST_DATA);
          const postsPath = 'posts.json';
          const posts = JSON.parse(fs.readFileSync(postsPath, 'utf8'));
          posts.push(post);
          fs.writeFileSync(postsPath, JSON.stringify(posts, null, 2));
          "
      - name: Commit and push
        run: |
          git config user.name "yfc-bot"
          git config user.email "yfc-bot@users.noreply.github.com"
          git add posts.json
          git commit -m "Add new post via form"
          git push
